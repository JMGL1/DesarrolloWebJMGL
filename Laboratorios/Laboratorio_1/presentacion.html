<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tarjeta de Presentación</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <div class="contenedor-principal">
        
        <section class="mi-tarjeta">
            
            <header class="cabecera-tarjeta">
                <img src="imges/perfil.png" alt="Mi foto" class="foto">
                <h1>Jose Manuel Gallardo Laura</h1>
                <h2>Ingeniería de Sistemas</h2>
            </header>

            <article class="cuerpo-tarjeta">
                <p>Estudiante apasionado por la tecnología, aprendiendo a crear páginas web paso a paso.</p>
                
                <ul class="lista-habilidades">
                    <li>HTML</li>
                    <li>CSS</li>
                    <li>JS</li>
                    <li>PHP</li>
                </ul>
            </article>

            <footer class="pie-tarjeta">
                <button class="boton-contacto">Escríbeme</button>
            </footer>

        </section>

    </div>

</body>
</html>
