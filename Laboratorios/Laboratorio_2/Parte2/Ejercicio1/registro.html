<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro Estudiantil</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <h1>Registro Estudiantil</h1>

    <div class="contenedor">
        <h2>Formulario vía GET</h2>
        <form action="procesar_registro.php" method="GET">
            <label>Nombre completo:</label> <input type="text" name="nombre">
            <label>Correo electrónico:</label> <input type="email" name="correo">
            <label>Carrera:</label>
            <select name="carrera">
                <option value="">Seleccione...</option>
                <option value="Sistemas">Ingeniería de Sistemas</option>
                <option value="Computación">Ciencias de la Computación</option>
            </select>
            <label>Semestre actual (1 al 10):</label> <input type="number" name="semestre" min="1" max="10">
            <label>Turno:</label>
            <div>
                <input type="radio" name="turno" value="Mañana"> Mañana
                <input type="radio" name="turno" value="Tarde"> Tarde
                <input type="radio" name="turno" value="Noche"> Noche
            </div>
            <label>Materias de interés:</label>
            <div>
                <input type="checkbox" name="materias[]" value="Programación Web"> Programación Web
                <input type="checkbox" name="materias[]" value="Bases de Datos"> Bases de Datos
                <input type="checkbox" name="materias[]" value="Redes"> Redes
            </div>
            <label>Comentarios:</label> <textarea name="comentarios" rows="3"></textarea>
            <button type="submit">Enviar por GET</button>
        </form>
    </div>

    <div class="contenedor">
        <h2>Formulario vía POST</h2>
        <form action="procesar_registro.php" method="POST">
            <label>Nombre completo:</label> <input type="text" name="nombre">
            <label>Correo electrónico:</label> <input type="email" name="correo">
            <label>Carrera:</label>
            <select name="carrera">
                <option value="">Seleccione...</option>
                <option value="Sistemas">Ingeniería de Sistemas</option>
                <option value="Computación">Ciencias de la Computación</option>
            </select>
            <label>Semestre actual (1 al 10):</label> <input type="number" name="semestre" min="1" max="10">
            <label>Turno:</label>
            <div>
                <input type="radio" name="turno" value="Mañana"> Mañana
                <input type="radio" name="turno" value="Tarde"> Tarde
                <input type="radio" name="turno" value="Noche"> Noche
            </div>
            <label>Materias de interés:</label>
            <div>
                <input type="checkbox" name="materias[]" value="Programación Web"> Programación Web
                <input type="checkbox" name="materias[]" value="Bases de Datos"> Bases de Datos
                <input type="checkbox" name="materias[]" value="Redes"> Redes
            </div>
            <label>Comentarios:</label> <textarea name="comentarios" rows="3"></textarea>
            <button type="submit">Enviar por POST</button>
        </form>
    </div>
</body>
</html>
