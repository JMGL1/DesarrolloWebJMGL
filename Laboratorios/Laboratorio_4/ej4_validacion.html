<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Ejercicio 4 - Validación de Formulario de Registro</title>

  <style type="text/css">
    body { font-family: Arial, sans-serif; padding: 30px; background: #f5f5f5; }
    h2   { color: #2c3e50; }

    .campo { margin-bottom: 14px; }
    label  { display: block; font-size: 14px; font-weight: bold; margin-bottom: 4px; }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      max-width: 460px;
      padding: 7px 9px;
      border: 2px solid #ccc;
      font-size: 14px;
      box-sizing: border-box;
    }

    input[type="submit"] {
      background: #2980b9;
      color: #fff;
      border: none;
      padding: 10px 24px;
      font-size: 15px;
      cursor: pointer;
      margin-top: 10px;
    }
    input[type="submit"]:hover { background: #1a5f8a; }
  </style>
</head>
<body>

  <h2>Ejercicio 4 - Validaci&oacute;n de Formulario de Registro</h2>


  <form id="miForm">

    <div class="campo">
      <label for="nombre">Nombre completo:</label>
      <input type="text" id="nombre" name="nombre" placeholder="Ej: Ana Lopez Garcia">
      <span id="err_nombre" style="display:none; color:red"></span>
    </div>

    <div class="campo">
      <label for="email">Correo electr&oacute;nico:</label>
      <input type="text" id="email" name="email" placeholder="usuario@dominio.com">
      <span id="err_email" style="display:none; color:red"></span>
    </div>

    <div class="campo">
      <label for="pass">Contrase&ntilde;a:</label>
      <input type="password" id="pass" name="pass" placeholder="8 a 10 caracteres, letras y números">
      <span id="err_pass" style="display:none; color:red"></span>
    </div>

    <div class="campo">
      <label for="telefono">Tel&eacute;fono (Bolivia):</label>
      <input type="text" id="telefono" name="telefono" placeholder="Ej: 71234567">
      <span id="err_telefono" style="display:none; color:red"></span>
    </div>

    <div class="campo">
      <label for="fecha">Fecha de nacimiento (DD/MM/AAAA):</label>
      <input type="text" id="fecha" name="fecha" placeholder="Ej: 01/01/2000">
      <span id="err_fecha" style="display:none; color:red"></span>
    </div>

    <div class="campo">
      <label for="direccion">Direcci&oacute;n:</label>
      <input type="text" id="direccion" name="direccion" placeholder="Ej: Av. Germán Bush 123">
      <span id="err_direccion" style="display:none; color:red"></span>
    </div>

    <input type="submit" value="Registrarse">

  </form>

  <script language="JavaScript" src="validar.js"></script>

</body>
</html>
