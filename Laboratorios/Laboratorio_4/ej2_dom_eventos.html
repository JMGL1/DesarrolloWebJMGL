<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Ejercicio 2 - DOM y Eventos</title>

  <style type="text/css">

    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    h2 { color: #2c3e50; }

    #panel {
      background-color: #FFEAA7;
      padding: 15px;
      min-height: 80px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
    }

    #seccion-agregar {
      margin-bottom: 15px;
    }

    #txtInput {
      width: 400px;
      padding: 6px;
      font-size: 14px;
      border: 1px solid #bbb;
    }

    button {
      padding: 6px 16px;
      font-size: 14px;
      cursor: pointer;
      margin-left: 6px;
    }

    #lista {
      border: 1px solid #ddd;
      min-height: 40px;
      padding: 8px;
      background: #fff;
      margin-bottom: 15px;
    }

    .item-dinamico {
      border-left: 3px solid #2980b9;
      padding: 4px 8px;
      margin: 4px 0;
      background: #eaf4fb;
      font-size: 14px;
    }

    #miImagen {
      width: 180px;
      height: 120px;
      display: block;
      margin-top: 10px;
      border: none;
      cursor: pointer;
    }

  </style>
</head>
<body>

  <h2>Ejercicio 2 - DOM y Eventos</h2>

  <div id="panel">
    <strong>Panel de Control</strong>
    <p id="colorActual">Color actual: Amarillo</p>
    <p id="cont">Clics: 0</p>
 
    <button onclick="cambiarColor()">Cambiar Color</button>
  </div>

  <div id="seccion-agregar">
    <label>Agregar párrafos dinámicos:</label><br>
    <input type="text" id="txtInput" placeholder="Texto de ejemplo ingresado por el usuario...">

    <button id="btnAgregar">Agregar</button>
    <button id="btnEliminar">Eliminar</button>
  </div>

  <div id="lista"></div>

  <img id="miImagen" src="https://via.placeholder.com/180x120?text=img+hover" alt="imagen hover">

  <script language="JavaScript" src="dom_eventos.js"></script>

</body>
</html>
